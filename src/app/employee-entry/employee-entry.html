<div class="employee-form">

  <h2>Employee Entry</h2>

  <form (ngSubmit)="postEmployee()" #employeeForm="ngForm">

    <input
      type="text"
      name="id"
      [(ngModel)]="employee.id"
      placeholder="Employee ID"
    />

    <input
      type="text"
      name="name"
      [(ngModel)]="employee.name"
      placeholder="Employee Name"
      required
    />

    <input
      type="text"
      name="fatherName"
      [(ngModel)]="employee.fatherName"
      placeholder="Father Name"
      required
    />

    <input
      type="number"
      name="salary"
      [(ngModel)]="employee.salary"
      placeholder="Salary"
      required
    />

    <input
      type="text"
      name="city"
      [(ngModel)]="employee.city"
      placeholder="City"
      required
    />

    <select
      name="gender"
      [(ngModel)]="employee.gender"
      required
    >
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>

    <input
      type="text"
      name="contactNumber"
      [(ngModel)]="employee.contactNumber"
      placeholder="Contact Number"
      required
    />

    <input
      type="email"
      name="email"
      [(ngModel)]="employee.email"
      placeholder="Email"
      required
    />

    <button type="submit">
      Save Employee
    </button>

  </form>

  @if(successMessage){
    <p class="success">
      {{ successMessage }}
    </p>
  }

  @if(errorMessage){
    <p class="error">
      {{ errorMessage }}
    </p>
  }

</div>
