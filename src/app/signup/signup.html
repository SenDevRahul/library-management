<div class="container">
  <h2>Signup</h2>

  <form (ngSubmit)="onSignup()">
    <div>
      <label>User Id</label>
      <input type="text" [(ngModel)]="user.userId" name="userId" required />
    </div>

    <div>
      <label>First Name</label>
      <input type="text" [(ngModel)]="user.firstName" name="firstName" required />
    </div>

    <div>
      <label>Last Name</label>
      <input type="lastName" [(ngModel)]="user.lastName" name="lastName" required />
    </div>

    <div>
      <label>Password</label>
      <input type="password" [(ngModel)]="user.password" name="password" required />
    </div>

    <button type="submit">Signup</button>
  </form>

  <p>
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>
  <p class="text-danger">{{errorMassage}}</p>
</div>
